name: "PR Sentinel"
description: "Dual-model AI review bot for pull requests and issues using Anthropic + OpenAI"
author: "hathbanger"

branding:
  icon: "shield"
  color: "blue"

inputs:
  anthropic_api_key:
    description: "Anthropic API key for Claude"
    required: true
  openai_api_key:
    description: "OpenAI API key for GPT/Codex"
    required: true
  github_token:
    description: "GitHub token for API access"
    required: false
    default: ${{ github.token }}
  config_path:
    description: "Path to pr-sentinel.yml config file"
    required: false
    default: ".github/pr-sentinel.yml"
  mode:
    description: "Override mode: review, review_and_suggest, review_and_patch, issue_triage, manual_only"
    required: false
  anthropic_model:
    description: "Anthropic model to use"
    required: false
    default: "claude-sonnet-4-20250514"
  openai_model:
    description: "OpenAI model to use"
    required: false
    default: "gpt-4o"
  trigger_label:
    description: "Label required to trigger reviews/fixes (default: agent)"
    required: false
    default: "agent"
  bot_name:
    description: "Bot name for @mention detection (default: pr-sentinel)"
    required: false
    default: "pr-sentinel"
  fix_mode:
    description: "Issue fix mode: propose_only, propose_and_pr, yolo"
    required: false
    default: "propose_and_pr"
  debug:
    description: "Enable debug logging"
    required: false
    default: "false"

outputs:
  review_json:
    description: "Full review result as JSON"
  findings_count:
    description: "Number of findings"
  action:
    description: "Decision taken (comment_only, request_changes, etc.)"

runs:
  using: "node20"
  main: "dist/index.js"
