# .github/sentinel.yml — Per-repo configuration
# All fields are optional. Defaults are shown below.

mode: review # review | review_and_suggest | review_and_patch | issue_triage | manual_only

models:
  anthropic:
    enabled: true
    model: claude-sonnet-4-20250514
  openai:
    enabled: true
    model: gpt-4o

trigger:
  require_label: agent # Only run when this label is present on PR/issue
  respond_to_mentions: true # Respond when @sentinel is mentioned
  respond_to_replies: true # Respond to replies on bot comments
  bot_name: sentinel # Name for @mention detection

review:
  max_files: 50
  max_patch_chars: 200000
  comment_style: comprehensive # concise | comprehensive
  inline_comments: true
  severity_threshold: medium # low | medium | high | critical

fix:
  mode: propose_and_pr # propose_only | propose_and_pr | yolo
  confidence_threshold: 0.7 # Only fix if model confidence exceeds this (0.0-1.0)
  max_retry_count: 2
  create_draft_pr: true # Create fix PRs as drafts (ignored in yolo mode)

security:
  restricted_paths:
    - ".github/workflows/**"
    - "infra/**"
    - "auth/**"
    - "payments/**"
  block_fork_mutation: true

validation:
  commands:
    - "npm ci"
    - "npm run lint"
    - "npm run typecheck"
    - "npm test"
