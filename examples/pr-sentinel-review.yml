# Copy this file to .github/workflows/pr-sentinel.yml in your repository.
#
# Required secrets:
#   ANTHROPIC_API_KEY — Anthropic API key for Claude
#   OPENAI_API_KEY   — OpenAI API key for GPT
#
# Required setup:
#   Create a label called "agent" in your repo (Settings → Labels → New label)
#
# Trigger behavior:
#   - PR labeled "agent" → dual-model review on every push
#   - Issue labeled "agent" → analyze code, propose fix
#   - @pr-sentinel in any comment → run appropriate action
#   - Reply to bot comment → conversational response
#
# Optional: create .github/pr-sentinel.yml for per-repo configuration.

name: PR Sentinel

on:
  pull_request:
    types: [opened, synchronize, reopened, labeled]
  issues:
    types: [opened, labeled]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: pr-sentinel-${{ github.event_name }}-${{ github.event.pull_request.number || github.event.issue.number || github.run_id }}
  cancel-in-progress: true

jobs:
  sentinel:
    name: PR Sentinel
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issues') ||
      (github.event_name == 'issue_comment' && (
        contains(github.event.comment.body, '@pr-sentinel') ||
        contains(github.event.comment.body, '/bot')
      ) && (
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'COLLABORATOR'
      )) ||
      (github.event_name == 'pull_request_review_comment' && (
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'COLLABORATOR'
      ))

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: hathbanger/pr-sentinel@main
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          openai_api_key: ${{ secrets.OPENAI_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
